name: build

# Enforces the guarantee the repository is built on: the generated
# documentation, diagrams and figures are derived from the code, so they
# cannot be allowed to fall behind it. Every push re-runs the pipeline and
# fails if the committed artefacts differ from what the code produces.
#
# Without this the sync mechanism is only a convention, and a convention
# that is never checked is one somebody will eventually forget.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"      # matches the local Windows install

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Record the environment
        # The generated SVGs carry the matplotlib version in their
        # metadata and their clip-path identifiers are only deterministic
        # within one version. Printing the versions here makes a drift
        # failure diagnosable in one glance instead of by bisecting.
        run: |
          python -c "import sys, matplotlib, rdflib, pandas; \
            print('python    ', sys.version.split()[0]); \
            print('matplotlib', matplotlib.__version__); \
            print('rdflib    ', rdflib.__version__); \
            print('pandas    ', pandas.__version__)"

      - name: Run the pipeline
        # Steps 1-6: export, SPARQL read-back, figures, round trip,
        # standalone bundle, documentation and diagrams. The round-trip
        # check is inside main.py and exits non-zero on any mismatch, so
        # a broken export fails here without extra assertions.
        run: python py/main.py

      - name: Check the documentation is up to date
        # Pure text, generated from the code structures. Deterministic on
        # any platform and any library version, so a difference here means
        # somebody changed the code without re-running the pipeline.
        run: |
          if ! git diff --quiet -- docs; then
            echo "::error::docs/ is stale. Run 'python py/main.py' and commit the result."
            git diff --stat -- docs
            git diff -- docs | head -120
            exit 1
          fi
          echo "docs/ and docs/diagrams/ match the code."

      - name: Check the figures are up to date
        # Kept separate from the documentation check because the failure
        # modes differ. Matplotlib writes its own version into the SVG
        # metadata and derives clip-path identifiers per version, so a
        # difference here is far more often a dependency mismatch than an
        # actual change to the figures. requirements.txt therefore pins
        # exact versions; if this step fails, compare the versions printed
        # by "Record the environment" against the local ones first.
        run: |
          if ! git diff --quiet -- img; then
            echo "::error::img/ differs. Check the library versions above against your local ones, then run 'python py/main.py' and commit."
            git diff --stat -- img
            git diff -- img | grep -E '^[-+].*(Matplotlib v|clip-path)' | head -20
            exit 1
          fi
          echo "img/ matches the code."

      - name: Validate the RDF
        # Semantic checks rather than byte comparison: the graphs must
        # parse, and the bundle must answer CIDOC CRM queries without a
        # reasoner. That last point is the whole reason the crosswalk is
        # materialised, so it is worth asserting rather than assuming.
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "py")
          from pathlib import Path
          from rdflib import Graph
          import make_bundle

          for f in sorted(Path("rdf").glob("*.ttl")):
              g = Graph(); g.parse(f, format="turtle")
              print(f"  {f}  {len(g)} triples")

          checks = make_bundle.verify(Path("rdf/IPSDatedSites-bundle.ttl"))
          for name, n in checks.items():
              print(f"  {name:<22} {n}")
          empty = [k for k, v in checks.items() if v == 0]
          if empty:
              sys.exit(f"Bundle answers nothing for: {', '.join(empty)}")
          print("Bundle resolves CIDOC CRM queries with no reasoner.")
          PY

      - name: Validate the Mermaid sources
        # The .mmd files are generated, but a change to the generator can
        # still emit syntax Mermaid rejects — and a diagram that fails to
        # parse renders as nothing on GitHub, silently.
        run: |
          npm install --no-save @mermaid-js/mermaid-cli
          mkdir -p /tmp/mmd-out
          for f in docs/diagrams/*.mmd; do
            npx --no-install mmdc -i "$f" -o "/tmp/mmd-out/$(basename "${f%.mmd}").svg" \
              --puppeteerConfigFile <(echo '{"args":["--no-sandbox"]}') \
              && echo "  OK  $f" || { echo "::error::Mermaid rejected $f"; exit 1; }
          done

      - name: Upload the rendered diagrams
        # Not committed to the repository: on GitHub and on Pages the
        # diagrams render from source. These SVGs are here for anyone who
        # needs them for print or for an appendix.
        uses: actions/upload-artifact@v4
        with:
          name: diagrams-svg
          path: /tmp/mmd-out/*.svg
          if-no-files-found: error
