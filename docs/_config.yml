title: IPS dated sites
description: >-
  Findspot datings from samian potters' stamps as linked data. Model
  documentation, generated from the code.

# Every page gets the default layout without needing YAML front matter of
# its own. The pages under docs/ are generated by py/make_docs.py, and
# adding front matter to each of them would mean the generator had to know
# about Jekyll. This keeps that knowledge here instead.
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# The .mmd sources sit next to the pages and are linked from them, but
# Jekyll should not try to render them as pages.
include:
  - diagrams

exclude:
  - "*.mmd"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
